<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OPEN SOURCE DRC Results Viewer</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<h3>OPEN SOURCE DRC Results Viewer</h3>
<p>by Eduardo Camacho</p> <br>
<input type="file" id="fileInput">






<div class="buttons" style="margin-left: 40px;">

<div id="headerInfo">
Cell: <span id="cellName">-</span>
Total Errors: <span id="errorCount">0</span>
<label>
<input style="width: 16px; height: 16px;" type="checkbox" id="hideWaived">
Hide Waived
</label>
</div>


<input type="text" style="padding: 8px;" id="searchRule" placeholder="Search rule...">

<button id="waiveBtn">Waive</button>
<button id="unwaiveBtn">Unwaive</button>
<button id="fixedBtn">Mark Fixed</button>
</div>

</header>

<main>

<div id="leftPanel"></div>

<div id="rightPanel">

<h3>Error Details</h3>

<div id="coords"></div>

</div>

</main>

<footer>

<h3>Rule Description</h3>

<div id="ruleDescription"></div>

</footer>

<script src="app.js"></script>

</body>
</html>
